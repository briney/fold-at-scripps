services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: fold
      POSTGRES_PASSWORD: fold
      POSTGRES_DB: fold_at_scripps
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fold -d fold_at_scripps"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
